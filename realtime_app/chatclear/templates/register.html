

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | ChatApp</title>
    <style>
        :root {
            --primary-color: #00a884; /* A fresh green for registration */
            --bg-gradient: linear-gradient(135deg, #00a884 0%, #005a46 100%);
            --white: #ffffff;
            --text-dark: #1c1e21;
            --text-gray: #65676b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Responsive Container */
        .register-card {
            background: var(--white);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px; /* Slightly wider for registration fields */
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 26px;
            color: var(--text-dark);
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Django form.as_p targets */
        form p {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dddfe2;
            border-radius: 8px;
            font-size: 16px; /* Prevents mobile zoom */
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 168, 132, 0.15);
        }

        /* Help text (e.g., password requirements) */
        .helptext {
            display: block;
            font-size: 11px;
            color: var(--text-gray);
            margin-top: 5px;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #008f70;
        }

        .login-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: var(--text-gray);
        }

        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        /* Error styling */
        .errorlist {
            color: #d93025;
            background: #fff2f2;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            list-style: none;
            margin: 0 0 20px 0;
            border: 1px solid #ffcfcf;
        }

        /* Media Query for small screens */
        @media (max-width: 400px) {
            .register-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join the community and start chatting.</p>

        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="error-container">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            {{ form.as_p }}

            <button type="submit">Register</button>
        </form>

        <div class="login-footer">
            Already have an account? <a href="/login/">Login</a>
        </div>
    </div>

</body>
</html>
